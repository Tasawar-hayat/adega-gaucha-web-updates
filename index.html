<!-- FULL HTML TEMPLATE FOR SINGLE POST SECTION -->
<main class="container blog-layout">
    
    <!-- Left Column: Content -->
    <article class="main-column">
        
        <header class="post-header">
            <h1 class="post-title">Your Post Title</h1>
            
            <div class="post-featured-image-placeholder">
                <img src="" alt="Featured Image" style="width:100%; height:100%; object-fit:cover; border-radius:var(--radius-lg); min-height: 400px; background-color: rgba(150,150,150,0.1);">
            </div>
            
            <div class="post-meta">
                <span>5 min read</span>
                <div class="post-author">
                    <div class="author-avatar" style="width:40px;height:40px;border-radius:50%;background:rgba(150,150,150,0.2);"></div>
                    <span>Author Name</span>
                </div>
                <div class="post-share">
                    <span style="opacity:0.8;font-size:0.85rem;text-transform:uppercase;letter-spacing:1px;font-weight:600;">Share:</span>
                    <a href="#" class="share-icon" title="Share on Facebook">
                        <svg viewBox="0 0 24 24" fill="currentColor" width="16" height="16"><path d="M18 2h-3a5 5 0 0 0-5 5v3H7v4h3v8h4v-8h3l1-4h-4V7a1 1 0 0 1 1-1h3z"></path></svg>
                    </a>
                    <a href="#" class="share-icon" title="Share on X">
                        <svg viewBox="0 0 24 24" fill="currentColor" width="16" height="16"><path d="M18.244 2.25h3.308l-7.227 8.26 8.502 11.24H16.17l-5.214-6.817L4.99 21.75H1.68l7.73-8.835L1.254 2.25H8.08l4.713 6.231zm-1.161 17.52h1.833L7.084 4.126H5.117z"></path></svg>
                    </a>
                    <a href="#" class="share-icon" title="Share on LinkedIn">
                        <svg viewBox="0 0 24 24" fill="currentColor" width="16" height="16"><path d="M16 8a6 6 0 0 1 6 6v7h-4v-7a2 2 0 0 0-2-2 2 2 0 0 0-2 2v7h-4v-7a6 6 0 0 1 6-6z"></path><rect x="2" y="9" width="4" height="12"></rect><circle cx="4" cy="4" r="2"></circle></svg>
                    </a>
                </div>
            </div>
        </header>

        <!-- Main Content Area -->
        <div class="post-content">
            <p>Your blog post content goes here...</p>
        </div>

    </article>

    <!-- Right Column (Sidebar) -->
    <aside class="sidebar">
        <div class="sidebar-inner">
            
            <!-- More Posts Widget -->
            <div class="widget">
                <h3 class="widget-title">Recent Posts</h3>
                <div class="more-posts-list">
                    <!-- Example Post 1 -->
                    <a href="#" class="more-post-card">
                        <div class="more-post-thumb" style="width:80px;height:60px;background:rgba(150,150,150,0.1);border-radius:8px;"></div>
                        <h4 class="more-post-title">Recent Post Title</h4>
                    </a>
                    <!-- Example Post 2 -->
                    <a href="#" class="more-post-card">
                        <div class="more-post-thumb" style="width:80px;height:60px;background:rgba(150,150,150,0.1);border-radius:8px;"></div>
                        <h4 class="more-post-title">Another Recent Post</h4>
                    </a>
                </div>
            </div>

            <!-- Contact/CTA Widget -->
            <div class="widget contact-widget">
                <h3 class="widget-title">Join Us</h3>
                <p>Experience the authentic taste of Southern Brazil.</p>
                <a href="/reservations" class="contact-btn">Reserve Your Table</a>
            </div>

        </div>
    </aside>
</main>

<!-- Bottom Section: Discover More -->
<section class="discover-section">
    <div class="container">
        <h2 class="section-title">Related Content</h2>
        <div class="grid-3">
            
            <article class="post-card">
                <div class="card-img" style="height:200px;background:rgba(150,150,150,0.1);"></div>
                <div class="card-content">
                    <h3 class="card-title">Related Post Title</h3>
                    <div class="post-author" style="margin-bottom:1rem;display:flex;align-items:center;gap:10px;">
                        <div class="author-avatar" style="width:24px;height:24px;border-radius:50%;background:rgba(150,150,150,0.2);"></div>
                        <span style="font-size:0.875rem;">Author Name</span>
                    </div>
                    <a href="#" class="read-more">Read More &raquo;</a>
                </div>
            </article>

        </div>
    </div>
</section>
