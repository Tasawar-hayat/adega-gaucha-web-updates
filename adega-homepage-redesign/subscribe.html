<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Adega Gaucha | Subscribe</title>
  
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&family=Oswald:wght@400;600;700&family=Jost:wght@300;400;600&display=swap" rel="stylesheet">
  
  <style>
    :root {
      --primary-orange: #F68625;
      --dark-bg: #050505;
      --font-heading: 'Oswald', 'Inter', sans-serif;
      --font-body: 'Inter', sans-serif;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: var(--font-body);
      background-color: var(--dark-bg);
      color: #fff;
      -webkit-font-smoothing: antialiased;
      overflow-x: hidden;
      background: radial-gradient(circle at 50% 50%, rgba(246, 134, 37, 0.05) 0%, transparent 70%), var(--dark-bg);
    }

    /* PREMIUM SUBSCRIBE SECTION */
    .subscribe-section {
      width: 100%;
      padding: 6rem 2rem;
      display: flex;
      justify-content: center;
      align-items: center;
    }

    /* WIDE 2-COLUMN GLASSMORPHIC ROW */
    .subscribe-row {
      width: 100%;
      max-width: 1200px;
      background: rgba(20, 20, 20, 0.4);
      backdrop-filter: blur(25px);
      -webkit-backdrop-filter: blur(25px);
      border: 1px solid rgba(255, 255, 255, 0.08);
      border-radius: 24px;
      padding: 4.5rem 5rem;
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 5rem;
      align-items: center;
      box-shadow: 0 30px 60px rgba(0,0,0,0.8), inset 0 1px 0 rgba(255,255,255,0.05);
      position: relative;
      overflow: hidden;
      opacity: 0;
      transform: translateY(30px);
      animation: fadeUpCard 1s cubic-bezier(0.25, 0.46, 0.45, 0.94) forwards;
    }

    /* Subtle top border glow */
    .subscribe-row::before {
      content: '';
      position: absolute;
      top: 0; left: 0; right: 0;
      height: 1px;
      background: linear-gradient(90deg, transparent, rgba(246, 134, 37, 0.8), transparent);
      opacity: 0.5;
    }

    /* LEFT SIDE CONTENT */
    .subscribe-content {
      text-align: left;
    }

    .subscribe-content h2 {
      font-family: var(--font-heading);
      font-size: 2.8rem;
      font-weight: 400;
      text-transform: uppercase;
      letter-spacing: 2px;
      margin-bottom: 1.2rem;
      color: #fff;
      line-height: 1.1;
    }

    .subscribe-content p {
      font-family: var(--font-body);
      font-size: 1.15rem;
      color: rgba(255, 255, 255, 0.6);
      line-height: 1.7;
      font-weight: 300;
    }

    /* RIGHT SIDE FORM */
    .subscribe-form-wrapper {
      width: 100%;
    }

    .subscribe-form {
      display: flex;
      flex-direction: column;
      gap: 1.2rem;
      width: 100%;
    }

    .input-group {
      position: relative;
      width: 100%;
    }

    .subscribe-form input {
      width: 100%;
      padding: 1rem 0;
      background: transparent;
      border: none;
      border-bottom: 1px solid rgba(255, 255, 255, 0.4);
      border-radius: 0;
      color: #fff;
      font-family: var(--font-body);
      font-size: 1.05rem;
      font-weight: 300;
      outline: none;
      transition: all 0.3s ease;
    }

    .subscribe-form input::placeholder {
      color: rgba(255, 255, 255, 0.4);
      font-weight: 300;
    }

    .subscribe-form input:focus {
      background: transparent;
      border-bottom-color: var(--primary-orange);
      box-shadow: 0 1px 0 var(--primary-orange);
    }

    /* PREMIUM BUTTON */
    .btn-cta {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      width: max-content;
      min-width: 200px;
      align-self: center;
      padding: 0.9rem 2.5rem;
      margin-top: 1.5rem;
      background: #000;
      color: #fff;
      font-family: var(--font-heading);
      font-size: 1rem;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 2px;
      border-radius: 12px;
      border: 2px solid #fff;
      cursor: pointer;
      transition: all 0.4s cubic-bezier(0.2, 0.8, 0.2, 1);
      box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5);
    }

    .btn-cta:hover {
      transform: translateY(-4px);
      background-color: var(--primary-orange);
      border-color: var(--primary-orange);
      color: #000;
      box-shadow: 0 15px 35px rgba(246, 134, 37, 0.35);
    }

    .btn-cta:disabled {
      opacity: 0.6;
      cursor: not-allowed;
      transform: none;
      box-shadow: none;
    }

    /* MESSAGES */
    .form-message {
      display: none;
      font-size: 1.05rem;
      margin-top: 1.5rem;
      padding: 1.2rem;
      border-radius: 12px;
      font-weight: 400;
      animation: fadeUpCard 0.6s ease forwards;
    }
    
    .form-message.success {
      background: rgba(46, 204, 113, 0.1);
      border: 1px solid rgba(46, 204, 113, 0.3);
      color: #2ecc71;
    }
    
    .form-message.error {
      background: rgba(231, 76, 60, 0.1);
      border: 1px solid rgba(231, 76, 60, 0.3);
      color: #e74c3c;
    }

    /* ANIMATIONS */
    @keyframes fadeUpCard {
      from { opacity: 0; transform: translateY(30px); }
      to { opacity: 1; transform: translateY(0); }
    }

    /* RESPONSIVE */
    @media (max-width: 950px) {
      .subscribe-row {
        grid-template-columns: 1fr;
        gap: 3rem;
        padding: 4rem 3rem;
        text-align: center;
      }
      .subscribe-content {
        text-align: center;
      }
      .subscribe-content h2 {
        font-size: 2.6rem;
      }
    }

    @media (max-width: 600px) {
      .subscribe-row {
        padding: 3.5rem 2rem;
      }
      .subscribe-content h2 {
        font-size: 2.2rem;
      }
      .subscribe-content p {
        font-size: 1rem;
      }
    }
  </style>
</head>
<body>

  <section class="subscribe-section" role="region" aria-label="Email Subscription">
    
    <div class="subscribe-row">
      <!-- LEFT SIDE: Text Content -->
      <div class="subscribe-content">
        <h2>Stay on the Guest List</h2>
        <p>Get first access to our events, celebrations, and special rewards before anyone else.</p>
      </div>
      
      <!-- RIGHT SIDE: Form Elements -->
      <div class="subscribe-form-wrapper">
        <!-- Form handled via JS - Backend logic remains completely untouched -->
        <form id="subscribe-form" class="subscribe-form">
          <div class="input-group">
            <input type="text" name="full_name" placeholder="First & Last Name" required>
          </div>
          <div class="input-group">
            <input type="email" name="email" placeholder="Email Address" required>
          </div>
          <button type="submit" class="btn-cta">Join Now</button>
        </form>
    
        <!-- Messages -->
        <div id="success-message" class="form-message success">
          Thank you for joining! Check your inbox for updates soon.
        </div>
        <div id="error-message" class="form-message error">
          Something went wrong. Please try again later.
        </div>
      </div>
    </div>

  </section>
  
  <script>
    // DO NOT TOUCH BACKEND LOGIC: Zapier Webhook
    document.getElementById('subscribe-form').addEventListener('submit', async function(e){
      e.preventDefault();
  
      const form = e.target;
      const data = new URLSearchParams();
      data.append("full_name", form.full_name.value);
      data.append("email", form.email.value);
  
      const btn = form.querySelector('button');
      btn.disabled = true;
      btn.textContent = "Sending...";
  
      try {
        const response = await fetch("https://hooks.zapier.com/hooks/catch/24746048/u93nzaj/", {
          method: "POST",
          body: data
        });
  
        if (response.ok) {
          form.style.display = "none";
          document.getElementById('success-message').style.display = "block";
        } else {
          throw new Error("Webhook error");
        }
  
      } catch (err) {
        document.getElementById('error-message').style.display = "block";
        btn.disabled = false;
        btn.textContent = "Join Now";
      }
    });
  </script>

</body>
</html>
