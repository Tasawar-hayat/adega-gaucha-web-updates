<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Adega Gaucha | Premium Brazilian Steakhouse</title>
  
  <!-- SEO Meta Tags -->
  <meta name="description" content="Experience the authentic taste of Southern Brazil at Adega Gaucha. Reserve your table for premium fire-roasted meats, catering, and to-go.">
  
  <!-- Google Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&family=Oswald:wght@400;600;700;800&family=Jost:wght@300;400;600&display=swap" rel="stylesheet">
  
  <!-- Custom Styles -->
  <style>
/* =========================================
   ADEGA GAUCHA - PREMIUM DARK MODE THEME
   ========================================= */

:root {
  /* Brand Colors */
  --primary-red: #B11116;      /* Adega Gaucha Red */
  --primary-orange: #F68625;   /* Adega Gaucha Orange */
  
  /* Dark Mode Aesthetic */
  --dark-bg: #0d0d0d;
  --dark-surface: #1a1a1a;
  --dark-surface-elevated: #242424;
  
  /* Typography Colors */
  --text-light: #f5f5f5;
  --text-muted: #a0a0a0;
  
  /* Accents */
  --gold-accent: #c5a059;
  
  /* Typography */
  --font-heading: 'Oswald', 'Inter', sans-serif;
  --font-body: 'Inter', sans-serif;
  
  /* Layout */
  --max-width: 1400px;
}

/* =========================================
   RESET & FOUNDATION
   ========================================= */
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
}

html, body {
  font-family: var(--font-body);
  background-color: var(--dark-bg);
  color: var(--text-light);
  line-height: 1.6;
  scroll-behavior: smooth;
  -webkit-font-smoothing: antialiased;
  margin: 0;
  padding: 0;
  overflow-x: hidden; /* Prevents horizontal panning but allows scrolling down */
}

h1, h2, h3, h4, h5, h6 {
  font-family: var(--font-heading);
  text-transform: uppercase;
  font-weight: 700;
  line-height: 1.2;
}

a {
  text-decoration: none;
  color: inherit;
}

img {
  max-width: 100%;
  height: auto;
  display: block;
}

.container {
  max-width: var(--max-width);
  margin: 0 auto;
  padding: 0 2rem;
}

/* =========================================
   BUTTONS & CTAs (Conversion Focus)
   ========================================= */
.btn {
  display: inline-flex;
  align-items: center;
  justify-content: center;
  padding: 1rem 2rem;
  font-family: var(--font-heading);
  font-size: 1.1rem;
  font-weight: 600;
  text-transform: uppercase;
  letter-spacing: 1px;
  border-radius: 4px;
  cursor: pointer;
  transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
  border: 2px solid transparent;
}

.btn-primary {
  background-color: var(--primary-orange);
  color: #fff;
  border: 2px solid var(--primary-orange);
}

.btn-primary:hover {
  transform: translateY(-2px);
  background-color: #d8711c; /* slightly darker orange for hover */
  border-color: #d8711c;
  box-shadow: 0 4px 15px rgba(246, 134, 37, 0.4);
}

.dropdown-icon {
  margin-left: 10px;
  vertical-align: middle;
}

.btn-outline {
  background: transparent;
  color: #fff;
  border-color: #fff;
}

.btn-outline:hover {
  background: #fff;
  color: var(--dark-bg);
}

/* =========================================
   NEW PREMIUM HEADER (DUNWOODY STYLE)
   ========================================= */
.ag-main-header {
  position: absolute;
  top: 0; left: 0; right: 0;
  width: 100%;
  z-index: 1000;
}

.ag-top-bar {
  background: #000;
  border-bottom: 1px solid rgba(255, 255, 255, 0.05);
  padding: 8px 0;
}

.ag-top-bar-container {
  display: flex;
  justify-content: space-between;
  align-items: center;
  max-width: 100%;
  padding: 0 4rem;
}

.ag-social-icons {
  display: flex;
  gap: 15px;
}
.ag-social-icons svg {
  width: 14px;
  height: 14px;
  fill: #fff;
  transition: fill 0.3s ease;
  cursor: pointer;
}
.ag-social-icons svg:hover {
  fill: var(--primary-orange);
}

.ag-top-links {
  display: flex;
  gap: 25px;
}
.ag-top-links a {
  font-family: 'Jost', sans-serif;
  font-size: 0.85rem;
  color: #c5a059;
  text-decoration: none;
  font-weight: 400;
  transition: color 0.3s ease;
}
.ag-top-links a:hover {
  color: #fff;
}
.ag-top-links a:last-child {
  color: #fff;
}
.ag-top-links a:last-child:hover {
  color: var(--primary-orange);
}

.ag-navbar {
  background: #000000;
  backdrop-filter: blur(2px);
  -webkit-backdrop-filter: blur(2px);
  padding: 12px 0;
  border-bottom: 1px solid rgba(255, 255, 255, 0.05);
}

.ag-nav-container {
  display: flex;
  justify-content: space-between;
  align-items: center;
  max-width: 100%;
  padding: 0 4rem;
  position: relative;
}

.ag-nav-left, .ag-nav-right {
  display: flex;
  align-items: center;
  gap: 30px;
  flex: 1;
}
.ag-nav-left { justify-content: flex-end; padding-right: 40px; }
.ag-nav-right { justify-content: flex-start; padding-left: 40px; }

.ag-nav-link {
  font-family: 'Inter', sans-serif;
  font-size: 0.8rem;
  font-weight: 500;
  color: #fff;
  letter-spacing: 1px;
  text-transform: uppercase;
  transition: color 0.3s ease;
}
.ag-nav-link:hover {
  color: var(--primary-orange);
}

.ag-logo-wrapper {
  flex: 0 0 auto;
  text-align: center;
  display: flex;
  align-items: center;
  justify-content: center;
}
.ag-logo-wrapper img {
  height: 110px;
}

.btn-reservations {
  background: var(--primary-orange);
  color: #ffffff !important;
  padding: 10px 20px;
  border-radius: 4px;
  font-weight: 600;
  letter-spacing: 1px;
  text-transform: uppercase;
  transition: background 0.3s ease;
}
.btn-reservations:hover {
  background: #d8711c;
  color: #ffffff !important;
}

/* MOBILE TOGGLE */
.ag-mobile-menu-toggle {
  display: none;
  flex-direction: column;
  gap: 6px;
  cursor: pointer;
  z-index: 1001;
}
.ag-mobile-menu-toggle span {
  width: 30px;
  height: 2px;
  background: #fff;
  transition: all 0.3s ease;
}

/* DRAWER */
.ag-drawer-overlay {
  position: fixed;
  top: 0; left: 0; width: 100%; height: 100%;
  background: rgba(0,0,0,0.8);
  z-index: 2000;
  opacity: 0; visibility: hidden;
  transition: all 0.3s ease;
}
.ag-drawer-overlay.active { opacity: 1; visibility: visible; }

.ag-mobile-drawer {
  position: fixed;
  top: 0; left: -300px;
  width: 300px; height: 100%;
  background: var(--dark-bg);
  z-index: 2001;
  box-shadow: 2px 0 20px rgba(0,0,0,0.8);
  transition: left 0.3s ease;
  display: flex;
  flex-direction: column;
  overflow-y: auto;
}
.ag-mobile-drawer.active { left: 0; }

.ag-drawer-header {
  display: flex; justify-content: space-between; align-items: center;
  padding: 20px;
  border-bottom: 1px solid rgba(255,255,255,0.05);
}
.ag-drawer-logo { height: 40px; }
.ag-drawer-close { font-size: 2.5rem; color: #fff; cursor: pointer; line-height: 1; }

.ag-drawer-nav {
  display: flex; flex-direction: column;
  padding: 20px;
  gap: 15px;
}
.ag-drawer-nav a {
  color: #fff; font-family: 'Inter', sans-serif;
  font-size: 1rem; font-weight: 500;
  letter-spacing: 1px;
}
.ag-drawer-btn {
  margin-top: 10px;
  background: var(--primary-orange);
  text-align: center; padding: 12px; border-radius: 4px;
}

.ag-drawer-footer {
  margin-top: auto;
  padding: 20px;
  border-top: 1px solid rgba(255,255,255,0.05);
  display: flex; flex-direction: column; gap: 10px;
}
.ag-drawer-footer a { color: #c5a059; font-size: 0.9rem; }
.ag-drawer-socials { display: flex; gap: 15px; margin-top: 10px; }
.ag-drawer-socials svg { width: 16px; height: 16px; fill: #fff; }

/* HEADER RESPONSIVE */
@media(max-width: 1100px) {
  .ag-top-bar-container, .ag-nav-container { padding: 0 2rem; }
  .ag-nav-left, .ag-nav-right { gap: 15px; }
  .ag-nav-left { padding-right: 20px; }
  .ag-nav-right { padding-left: 20px; }
}
@media(max-width: 992px) {
  .ag-nav-left { display: none; }
  .ag-nav-right .ag-nav-link { display: none; }
  .ag-nav-right { padding-left: 0; flex: 0 0 auto; gap: 0; }
  .ag-top-links { display: none; }
  .ag-mobile-menu-toggle { display: flex; flex: 0 0 auto; }
  .ag-nav-container { justify-content: space-between; }
  .ag-logo-wrapper { position: absolute; left: 50%; top: 25px; transform: translateX(-50%); z-index: 1005; }
}
@media(max-width: 480px) {
  .ag-top-bar-container, .ag-nav-container { padding: 0 1rem; }
  .ag-logo-wrapper img { height: 80px; }
  .btn-reservations { padding: 8px 12px; font-size: 0.75rem; }
}

/* =========================================
   SECTION STYLING
   ========================================= */
.section {
  padding: 6rem 0;
}

.section-header {
  text-align: center;
  margin-bottom: 4rem;
}

.section-title {
  font-size: 3rem;
  color: #fff;
  margin-bottom: 1rem;
}

.section-subtitle {
  font-size: 1.2rem;
  color: var(--primary-orange);
  font-weight: 600;
  letter-spacing: 2px;
}

/* =========================================
   NEW SPLIT HERO SECTION (Screenshot Match)
   ========================================= */
#adega-hero-v4 {
    --black: #000000;
    --charcoal: #0a0a08;
    --charcoal-mid: #121212;
    --charcoal-lt: #1a1a1a;
    --gold: #F68625;
    --gold-light: #ff9d47;
    --gold-dim: #cc6b1c;
    --brand-orange: #F68625;
    --cream: #FFF9F5;
    --cream-dim: rgba(255, 249, 245, 0.7);
    --white: #ffffff;
    --font-display: 'Cormorant Garamond', Georgia, serif;
    --font-body: 'Barlow', sans-serif;
    --font-label: 'Barlow Condensed', sans-serif;
    --ease-expo: cubic-bezier(0.16, 1, 0.3, 1);
    --radius-sm: 4px;
    --radius-md: 12px;
    --radius-full: 9999px;
    
    position: relative;
    min-height: 100vh;
    background: var(--black);
    color: var(--cream);
    font-family: var(--font-body);
    overflow: hidden;
}

#adega-hero-v4 * { box-sizing: border-box; }

@keyframes heroFadeInV4 { from { opacity: 0; } to { opacity: 1; } }
@keyframes heroFadeUpV4 { from { opacity: 0; transform: translateY(24px); } to { opacity: 1; transform: none; } }
@keyframes heroPulseV4 { 0% { transform: scale(1); opacity: 1; } 50% { transform: scale(1.6); opacity: 0.4; } 100% { transform: scale(1); opacity: 1; } }
@keyframes heroFloatV4 { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-10px); } }
@keyframes heroRingPulseV4 { 0%, 100% { opacity: 0.2; transform: translate(-50%, -50%) scale(1); } 50% { opacity: 0.5; transform: translate(-50%, -50%) scale(1.02); } }
@keyframes heroScrollDropV4 { 0% { transform: scaleY(0); transform-origin: top; } 50% { transform: scaleY(1); transform-origin: top; } 51% { transform: scaleY(1); transform-origin: bottom; } 100% { transform: scaleY(0); transform-origin: bottom; } }

#adega-hero-v4 .hero {
    position: relative;
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
}

#adega-hero-v4 .hero-slider {
    position: absolute;
    inset: 0;
    opacity: 0.7;
    background: var(--black);
}

#adega-hero-v4 .hero-slide {
    position: absolute;
    inset: 0;
    background-size: cover;
    background-position: center;
    opacity: 0;
    transition: opacity 1.5s ease-in-out, transform 8s ease;
    transform: scale(1.05);
}

#adega-hero-v4 .hero-slide.active {
    opacity: 1;
    transform: scale(1);
}

#adega-hero-v4 .hero-overlay {
    position: absolute;
    inset: 0;
    background: radial-gradient(ellipse 70% 90% at 50% 60%, rgba(0, 0, 0, 0.1) 0%, rgba(0, 0, 0, 0.4) 100%), 
                linear-gradient(180deg, rgba(0, 0, 0, 0.2) 0%, rgba(0, 0, 0, 0) 40%, rgba(0, 0, 0, 0.6) 100%);
}

#adega-hero-v4 .hero-ring {
    position: absolute;
    border-radius: 50%;
    border: 1px solid rgba(246, 134, 37, 0.12);
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    animation: heroRingPulseV4 6s ease-in-out infinite;
}

#adega-hero-v4 .hero-ring:nth-child(1) { width: 520px; height: 520px; animation-delay: 0s; }
#adega-hero-v4 .hero-ring:nth-child(2) { width: 720px; height: 720px; animation-delay: 1s; border-color: rgba(246, 134, 37, 0.08); }
#adega-hero-v4 .hero-ring:nth-child(3) { width: 920px; height: 920px; animation-delay: 2s; border-color: rgba(246, 134, 37, 0.05); }

#adega-hero-v4 .hero-content {
    position: relative;
    z-index: 2;
    display: flex;
    flex-direction: column;
    align-items: center;
    text-align: center;
    padding: 165px 2rem 2rem;
    gap: 1.5rem;
}

#adega-hero-v4 .hero-eyebrow {
    display: flex;
    align-items: center;
    gap: 1.5rem;
    font-family: var(--font-label);
    font-size: 0.75rem;
    font-weight: 700;
    letter-spacing: 0.35em;
    text-transform: uppercase;
    color: var(--brand-orange);
    opacity: 0;
    animation: heroFadeInV4 1.2s var(--ease-expo) 0.4s forwards;
}
#adega-hero-v4 .hero-eyebrow::before, #adega-hero-v4 .hero-eyebrow::after { content: ''; display: block; width: 40px; height: 1px; background: linear-gradient(to right, transparent, var(--brand-orange)); opacity: 0.4; }
#adega-hero-v4 .hero-eyebrow::after { background: linear-gradient(to left, transparent, var(--brand-orange)); }

#adega-hero-v4 .hero-title {
    font-family: var(--font-display);
    font-size: clamp(4rem, 10vw, 7.5rem);
    font-weight: 300;
    line-height: 0.8;
    color: var(--white);
    margin: 0;
    opacity: 0;
    animation: heroFadeUpV4 1.2s var(--ease-expo) 0.6s forwards;
}

#adega-hero-v4 .hero-title span {
    display: block;
    font-family: var(--font-label);
    font-size: clamp(0.8rem, 1.5vw, 1rem);
    font-weight: 700;
    letter-spacing: 0.4em;
    text-transform: uppercase;
    color: var(--brand-orange);
    margin-bottom: 1rem;
}

#adega-hero-v4 .hero-title em { font-style: italic; color: var(--brand-orange); display: block; margin-top: 0.2rem; }

#adega-hero-v4 .hero-email-capture {
    margin-top: 2rem;
    width: 100%;
    max-width: 600px;
    background: rgba(255, 255, 255, 0.04);
    backdrop-filter: blur(20px);
    padding: 2rem;
    border: 1px solid rgba(255, 249, 245, 0.1);
    border-radius: var(--radius-md);
    opacity: 0;
    animation: heroFadeUpV4 1s var(--ease-expo) 1.1s forwards, heroFloatV4 6s ease-in-out infinite 2s;
    box-shadow: 0 40px 100px rgba(0, 0, 0, 0.8);
}

#adega-hero-v4 .email-form { display: flex; gap: 0.8rem; flex-wrap: wrap; }
#adega-hero-v4 .email-form input { flex: 1; min-width: 200px; padding: 0.9rem 1.2rem; border-radius: var(--radius-sm); border: 1px solid rgba(255, 249, 245, 0.15); background: rgba(0, 0, 0, 0.3); color: var(--cream); outline: none; transition: all 0.3s; }
#adega-hero-v4 .email-form input:focus { border-color: var(--brand-orange); background: rgba(0, 0, 0, 0.6); }

#adega-hero-v4 .btn-primary { display: inline-flex; align-items: center; gap: 0.5rem; padding: 0.9rem 2rem; background: var(--brand-orange); color: var(--white); font-family: var(--font-label); font-size: 0.75rem; font-weight: 700; letter-spacing: 0.1em; text-transform: uppercase; border-radius: var(--radius-sm); transition: all 0.3s; text-decoration: none; border: none; cursor: pointer; }
#adega-hero-v4 .btn-primary:hover { background: #e57615; transform: translateY(-2px); }

#adega-hero-v4 .fomo-tag { font-family: var(--font-label); font-size: 0.6rem; font-weight: 700; color: var(--brand-orange); letter-spacing: 0.05em; text-transform: uppercase; display: flex; align-items: center; justify-content: center; gap: 0.6rem; margin-top: 1rem; }
#adega-hero-v4 .pulse-dot { width: 6px; height: 6px; background: var(--brand-orange); border-radius: 50%; animation: heroPulseV4 2s infinite; }

#adega-hero-v4 .hero-scroll { position: absolute; bottom: 2rem; left: 50%; transform: translateX(-50%); display: flex; flex-direction: column; align-items: center; gap: 0.5rem; opacity: 0; animation: heroFadeUpV4 1s var(--ease-expo) 1.5s forwards; }
#adega-hero-v4 .hero-scroll span { font-family: var(--font-label); font-size: 0.6rem; letter-spacing: 0.2em; text-transform: uppercase; color: var(--gold-dim); }
#adega-hero-v4 .scroll-line { width: 1px; height: 30px; background: linear-gradient(180deg, var(--gold-dim), transparent); animation: heroScrollDropV4 2s ease-in-out infinite; }

@media (max-width: 768px) {
    #adega-hero-v4 .hero-content { padding-top: 140px; padding-inline: 1.5rem; }
    #adega-hero-v4 .hero-title { font-size: clamp(3.2rem, 12vw, 4.5rem); line-height: 0.95; }
    
    #adega-hero-v4 .hero-email-capture { padding: 1.5rem; margin-top: 1.5rem; }
    #adega-hero-v4 .email-form { flex-direction: column; gap: 0.8rem; }
    #adega-hero-v4 .email-form input, 
    #adega-hero-v4 .btn-primary { 
        width: 100%; 
        font-size: 0.85rem; 
        text-align: center;
        justify-content: center;
    }
    
    #adega-hero-v4 .fomo-tag { 
        flex-direction: row; 
        align-items: center;
        justify-content: center;
        gap: 0.5rem; 
        line-height: 1.2; 
        text-align: center;
        margin-top: 1.2rem;
    }
    #adega-hero-v4 .pulse-dot { margin-bottom: 0; flex-shrink: 0; }
    
    #adega-hero-v4 .hero-scroll { bottom: 2rem; }
}

</style>
</head>

  <script>
    document.addEventListener('DOMContentLoaded', function() {
      // Toggle mobile menu drawer
      const mobileToggle = document.getElementById('ag-mobile-toggle');
      const mobileDrawer = document.getElementById('ag-mobile-drawer');
      const drawerClose = document.getElementById('ag-drawer-close');
      const drawerOverlay = document.getElementById('ag-drawer-overlay');

      function openDrawer() {
        if(mobileDrawer) mobileDrawer.classList.add('active');
        if(drawerOverlay) drawerOverlay.classList.add('active');
      }

      function closeDrawer() {
        if(mobileDrawer) mobileDrawer.classList.remove('active');
        if(drawerOverlay) drawerOverlay.classList.remove('active');
      }

      if(mobileToggle) mobileToggle.addEventListener('click', openDrawer);
      if(drawerClose) drawerClose.addEventListener('click', closeDrawer);
      if(drawerOverlay) drawerOverlay.addEventListener('click', closeDrawer);

      // Handle slider for adega-hero-v4
      const heroV4 = document.querySelector('#adega-hero-v4');
      if (heroV4) {
          const slides = heroV4.querySelectorAll('.hero-slide');
          if (slides.length > 0) {
              let currentSlide = 0;
              setInterval(() => {
                  slides[currentSlide].classList.remove('active');
                  currentSlide = (currentSlide + 1) % slides.length;
                  slides[currentSlide].classList.add('active');
              }, 6000);
          }
      }
    });
  </script>
